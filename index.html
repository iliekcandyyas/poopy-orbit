<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gesture Launcher</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mediapipe/0.10.8/camera_utils/camera_utils.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060810;
      --panel: #0d1117;
      --accent: #00f5a0;
      --accent2: #00d4ff;
      --warn: #ff6b35;
      --text: #e8eaf0;
      --muted: #4a5568;
      --glow: 0 0 20px rgba(0, 245, 160, 0.4);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,160,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,160,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial glow center */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,245,160,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
      max-width: 700px;
      padding: 20px;
    }

    header {
      text-align: center;
    }

    .title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      line-height: 1;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Camera feed */
    .camera-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(0,245,160,0.15);
      background: #000;
    }

    #webcam {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      opacity: 0;
      transition: opacity 0.5s;
    }

    #webcam.loaded { opacity: 1; }

    #canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }

    /* Corner decorations */
    .corner {
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: var(--accent);
      border-style: solid;
      z-index: 2;
    }
    .corner.tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
    .corner.tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
    .corner.bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
    .corner.br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

    /* Status overlay */
    .status-overlay {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(6, 8, 16, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0,245,160,0.2);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.7rem;
      letter-spacing: 1px;
      white-space: nowrap;
      z-index: 3;
      transition: all 0.3s;
    }

    .status-overlay.detected {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: var(--glow);
    }

    /* Gesture indicator */
    .gesture-panel {
      width: 100%;
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 14px 18px;
    }

    .fingers {
      display: flex;
      gap: 8px;
    }

    .finger {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .finger-icon {
      width: 28px;
      height: 44px;
      border-radius: 14px 14px 6px 6px;
      border: 2px solid var(--muted);
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .finger-icon::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 0%;
      background: var(--accent);
      transition: height 0.2s;
    }

    .finger.up .finger-icon {
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(0,245,160,0.5);
    }

    .finger.up .finger-icon::after {
      height: 100%;
    }

    .finger-label {
      font-size: 0.55rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .gesture-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .gesture-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text);
    }

    .gesture-desc {
      font-size: 0.65rem;
      color: var(--muted);
    }

    /* Progress ring */
    .progress-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .progress-ring {
      transform: rotate(-90deg);
    }

    .progress-ring circle {
      transition: stroke-dashoffset 0.1s linear;
    }

    /* Launch flash */
    .launch-flash {
      position: fixed;
      inset: 0;
      background: var(--accent);
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: opacity 0.1s;
    }

    .launch-flash.active {
      opacity: 0.3;
      animation: flash 0.4s ease-out forwards;
    }

    @keyframes flash {
      0% { opacity: 0.4; }
      100% { opacity: 0; }
    }

    /* URL bar */
    .url-bar {
      width: 100%;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .url-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .url-input {
      flex: 1;
      background: var(--panel);
      border: 1px solid rgba(0,245,160,0.2);
      border-radius: 6px;
      padding: 8px 12px;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent);
      outline: none;
      transition: border-color 0.2s;
    }

    .url-input:focus {
      border-color: var(--accent);
      box-shadow: var(--glow);
    }

    /* Loading state */
    .loading-msg {
      font-size: 0.7rem;
      color: var(--muted);
      animation: blink 1.2s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .scanline {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.4;
      animation: scan 4s linear infinite;
      pointer-events: none;
      z-index: 50;
    }

    @keyframes scan {
      0% { top: 0; }
      100% { top: 100vh; }
    }
  </style>
</head>
<body>

<div class="scanline"></div>
<div class="launch-flash" id="launchFlash"></div>

<div class="container">
  <header>
    <div class="title">GESTURE LAUNCH</div>
    <div class="subtitle">Hand-triggered URL opener</div>
  </header>

  <div class="url-bar">
    <span class="url-label">TARGET →</span>
    <input class="url-input" id="urlInput" type="text" value="https://g.dev/iliekcandyyas" placeholder="https://..." />
  </div>

  <div class="camera-wrap" id="cameraWrap">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <video id="webcam" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
    <div class="status-overlay" id="statusOverlay">INITIALIZING CAMERA...</div>
  </div>

  <div class="gesture-panel">
    <div class="fingers">
      <div class="finger" id="f-thumb">
        <div class="finger-icon"></div>
        <div class="finger-label">Thumb</div>
      </div>
      <div class="finger" id="f-index">
        <div class="finger-icon"></div>
        <div class="finger-label">Index</div>
      </div>
      <div class="finger" id="f-middle">
        <div class="finger-icon"></div>
        <div class="finger-label">Middle</div>
      </div>
      <div class="finger" id="f-ring">
        <div class="finger-icon"></div>
        <div class="finger-label">Ring</div>
      </div>
      <div class="finger" id="f-pinky">
        <div class="finger-icon"></div>
        <div class="finger-label">Pinky</div>
      </div>
    </div>

    <div class="gesture-info">
      <div class="gesture-title" id="gestureTitle">WAITING FOR HAND</div>
      <div class="gesture-desc" id="gestureDesc">Raise 👍 + ☝️ + 🖕 to launch</div>
    </div>

    <div class="progress-wrap">
      <svg class="progress-ring" width="44" height="44">
        <circle cx="22" cy="22" r="18" fill="none" stroke="#1a2030" stroke-width="3"/>
        <circle id="progressCircle" cx="22" cy="22" r="18" fill="none"
          stroke="#00f5a0" stroke-width="3"
          stroke-dasharray="113"
          stroke-dashoffset="113"
          stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <div class="loading-msg" id="loadingMsg">LOADING MEDIAPIPE MODEL...</div>
</div>

<script type="module">
  import { FilesetResolver, HandLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/vision_bundle.mjs";

  const video = document.getElementById('webcam');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const statusOverlay = document.getElementById('statusOverlay');
  const loadingMsg = document.getElementById('loadingMsg');
  const gestureTitle = document.getElementById('gestureTitle');
  const gestureDesc = document.getElementById('gestureDesc');
  const progressCircle = document.getElementById('progressCircle');
  const launchFlash = document.getElementById('launchFlash');
  const urlInput = document.getElementById('urlInput');

  const fingerEls = {
    thumb: document.getElementById('f-thumb'),
    index: document.getElementById('f-index'),
    middle: document.getElementById('f-middle'),
    ring: document.getElementById('f-ring'),
    pinky: document.getElementById('f-pinky'),
  };

  const HOLD_DURATION = 1500; // ms to hold gesture before launch
  const CIRCUMFERENCE = 113;

  let handLandmarker = null;
  let holdStart = null;
  let launched = false;
  let lastVideoTime = -1;

  // Init MediaPipe
  async function init() {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm"
    );
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numHands: 1
    });

    loadingMsg.textContent = 'MODEL LOADED — STARTING CAMERA';

    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 } });
    video.srcObject = stream;
    video.addEventListener('loadeddata', () => {
      video.classList.add('loaded');
      statusOverlay.textContent = 'CAMERA ACTIVE — SHOW YOUR HAND';
      loadingMsg.style.display = 'none';
      requestAnimationFrame(detect);
    });
  }

  function isFingerUp(landmarks, finger) {
    // Tip and PIP joint indices
    const tips =   { thumb: 4,  index: 8,  middle: 12, ring: 16, pinky: 20 };
    const pips =   { thumb: 2,  index: 6,  middle: 10, ring: 14, pinky: 18 };

    if (finger === 'thumb') {
      // Thumb: compare x position (since thumb goes sideways)
      return landmarks[tips.thumb].x < landmarks[pips.thumb].x;
    }
    return landmarks[tips[finger]].y < landmarks[pips[finger]].y;
  }

  function detect() {
    if (!handLandmarker) { requestAnimationFrame(detect); return; }

    const now = performance.now();
    if (video.currentTime !== lastVideoTime) {
      lastVideoTime = video.currentTime;

      // Resize canvas to match video
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      const results = handLandmarker.detectForVideo(video, now);

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (results.landmarks && results.landmarks.length > 0) {
        const landmarks = results.landmarks[0];
        drawHand(landmarks);

        const fingers = {
          thumb: isFingerUp(landmarks, 'thumb'),
          index: isFingerUp(landmarks, 'index'),
          middle: isFingerUp(landmarks, 'middle'),
          ring: isFingerUp(landmarks, 'ring'),
          pinky: isFingerUp(landmarks, 'pinky'),
        };

        // Update finger indicators
        Object.entries(fingers).forEach(([name, up]) => {
          fingerEls[name].classList.toggle('up', up);
        });

        const gestureMatch = fingers.thumb && fingers.index && fingers.middle && !fingers.ring && !fingers.pinky;

        statusOverlay.textContent = 'HAND DETECTED';
        statusOverlay.classList.add('detected');

        if (gestureMatch) {
          gestureTitle.textContent = '🎯 GESTURE DETECTED';
          gestureDesc.textContent = 'Hold to launch...';

          if (!holdStart) holdStart = now;
          const elapsed = now - holdStart;
          const progress = Math.min(elapsed / HOLD_DURATION, 1);
          const offset = CIRCUMFERENCE - (progress * CIRCUMFERENCE);
          progressCircle.style.strokeDashoffset = offset;

          if (progress >= 1 && !launched) {
            launched = true;
            triggerLaunch();
          }
        } else {
          holdStart = null;
          launched = false;
          progressCircle.style.strokeDashoffset = CIRCUMFERENCE;

          const upCount = Object.values(fingers).filter(Boolean).length;
          gestureTitle.textContent = upCount === 0 ? 'HAND VISIBLE' : `${upCount} FINGER${upCount > 1 ? 'S' : ''} UP`;
          gestureDesc.textContent = 'Raise 👍 index + middle to launch';
        }
      } else {
        Object.values(fingerEls).forEach(el => el.classList.remove('up'));
        statusOverlay.textContent = 'NO HAND DETECTED';
        statusOverlay.classList.remove('detected');
        gestureTitle.textContent = 'WAITING FOR HAND';
        gestureDesc.textContent = 'Raise 👍 + ☝️ + 🖕 to launch';
        holdStart = null;
        launched = false;
        progressCircle.style.strokeDashoffset = CIRCUMFERENCE;
      }
    }

    requestAnimationFrame(detect);
  }

  function drawHand(landmarks) {
    const W = canvas.width;
    const H = canvas.height;

    const connections = [
      [0,1],[1,2],[2,3],[3,4],
      [0,5],[5,6],[6,7],[7,8],
      [0,9],[9,10],[10,11],[11,12],
      [0,13],[13,14],[14,15],[15,16],
      [0,17],[17,18],[18,19],[19,20],
      [5,9],[9,13],[13,17]
    ];

    ctx.strokeStyle = 'rgba(0, 245, 160, 0.6)';
    ctx.lineWidth = 2;
    connections.forEach(([a, b]) => {
      ctx.beginPath();
      ctx.moveTo(landmarks[a].x * W, landmarks[a].y * H);
      ctx.lineTo(landmarks[b].x * W, landmarks[b].y * H);
      ctx.stroke();
    });

    landmarks.forEach((lm, i) => {
      ctx.beginPath();
      ctx.arc(lm.x * W, lm.y * H, i === 0 ? 6 : 4, 0, Math.PI * 2);
      ctx.fillStyle = i === 0 ? '#00d4ff' : '#00f5a0';
      ctx.fill();
    });
  }

  function triggerLaunch() {
    launchFlash.classList.add('active');
    setTimeout(() => launchFlash.classList.remove('active'), 400);

    gestureTitle.textContent = '🚀 LAUNCHING!';

    let url = urlInput.value.trim();
    if (!url.startsWith('http://') && !url.startsWith('https://')) {
      url = 'https://' + url;
    }
    setTimeout(() => {
      window.open(url, '_blank');
      holdStart = null;
      launched = false;
      progressCircle.style.strokeDashoffset = CIRCUMFERENCE;
    }, 300);
  }

  init().catch(err => {
    loadingMsg.textContent = 'ERROR: ' + err.message;
    statusOverlay.textContent = 'FAILED TO INIT';
  });
</script>
</body>
</html>
